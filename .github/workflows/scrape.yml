name: Run Scrapers

on:
  workflow_dispatch:
    inputs:
      scraper:
        description: 'Scraper to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - biggie
          - stock
          - casa-rica
          - superseis
  schedule:
    - cron: '0 6 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scrapers
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ "${{ github.event.inputs.scraper || 'all' }}" = "all" ]; then
            npx tsx scraper/run-all.ts
          else
            npx tsx scraper/run-scraper.ts ${{ github.event.inputs.scraper || 'all' }}
          fi
